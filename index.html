<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tinkerbot Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f7f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .scene {
      position: relative;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 60px;
    }

    /* App cards floating above */
    .cards-area {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 48px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 16px;
      text-align: center;
    }

    .app-card {
      background: white;
      border-radius: 20px;
      padding: 22px;
      border: 1.5px solid #ede8e2;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .app-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      transform: translateY(-3px);
    }
    .app-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .app-icon.mise { background: #ede8f5; }
    .app-icon.cents { background: #e8f0ec; }
    .app-info { flex: 1; min-width: 0; }
    .app-name {
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 3px;
    }
    .app-desc {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }
    .arrow { font-size: 20px; color: #ccc; flex-shrink: 0; }

    /* Connector line from cards down to robot */
    .connector {
      width: 3px;
      height: 48px;
      background: linear-gradient(to bottom, #e0d8d0, transparent);
      border-radius: 2px;
      z-index: 2;
      margin: 0 auto;
    }

    /* Robot hero */
    .robot-area {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .robot-img {
      width: 260px;
      height: 260px;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(240,120,80,0.25));
    }
    .studio-name {
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #bbb;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    footer {
      font-size: 11px;
      color: #ccc;
      padding: 16px;
      margin-top: auto;
    }

    @media (max-width: 480px) {
      .robot-img { width: 200px; height: 200px; }
      .app-card { gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="cards-area">
      <div class="section-label">Apps</div>

      <a class="app-card" href="https://mise-en-stock.vercel.app/" target="_blank">
        <div class="app-icon mise">🥫</div>
        <div class="app-info">
          <div class="app-name">Mise en Stock</div>
          <div class="app-desc">Pantry and freezer inventory tracker. Scan barcodes, organize by category, and always know what's in stock.</div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="app-card" href="https://commoncents-tinkerbot.vercel.app" target="_blank">
        <div class="app-icon cents">¢</div>
        <div class="app-info">
          <div class="app-name">Common Cents</div>
          <div class="app-desc">Shared expense tracker for two. Split bills, track balances, and settle up with ease.</div>
        </div>
        <div class="arrow">›</div>
      </a>
    </div>

    <div class="connector"></div>

    <div class="robot-area">
      <img class="robot-img" src="https://raw.githubusercontent.com/gyeung03/tinkerbot-studios/main/Tinkerbot.png" alt="Tinkerbot Studios"/>
      <div class="studio-name">Tinkerbot Studios</div>
    </div>
  </div>

  <footer>© 2026 Tinkerbot Studios</footer>
</body>
</html>
