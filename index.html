<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tinkerbot Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #f7f4f0;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Giant robot fills the page */
    .robot-bg {
      position: absolute;
      width: 130vmin;
      height: 130vmin;
      bottom: -30vmin;
      left: 50%;
      transform: translateX(-50%);
      object-fit: contain;
      z-index: 0;
      filter: drop-shadow(0 -20px 80px rgba(240,120,80,0.3));
      pointer-events: none;
    }

    /* Cards positioned inside the robot circle, around face area */
    .cards-area {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: -20vmin;
    }

    .studio-name {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.7);
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .app-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 18px 20px;
      border: 1.5px solid rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .app-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      transform: translateY(-2px);
    }
    .app-icon {
      width: 50px; height: 50px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .app-icon.mise { background: #ede8f5; }
    .app-icon.cents { background: #e8f0ec; }
    .app-info { flex: 1; min-width: 0; }
    .app-name {
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 2px;
    }
    .app-desc {
      font-size: 11px;
      color: #999;
      line-height: 1.4;
    }
    .arrow { font-size: 18px; color: #ccc; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="page">
    <img class="robot-bg" src="https://raw.githubusercontent.com/gyeung03/tinkerbot-studios/main/Tinkerbot.png" alt="Tinkerbot"/>

    <div class="cards-area">
      <div class="studio-name">Tinkerbot Studios</div>

      <a class="app-card" href="https://mise-en-stock.vercel.app/" target="_blank">
        <div class="app-icon mise">🥫</div>
        <div class="app-info">
          <div class="app-name">Mise en Stock</div>
          <div class="app-desc">Pantry and freezer inventory tracker. Scan barcodes, organize by category, and always know what's in stock.</div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="app-card" href="https://commoncents-tinkerbot.vercel.app" target="_blank">
        <div class="app-icon cents">¢</div>
        <div class="app-info">
          <div class="app-name">Common Cents</div>
          <div class="app-desc">Shared expense tracker for two. Split bills, track balances, and settle up with ease.</div>
        </div>
        <div class="arrow">›</div>
      </a>
    </div>
  </div>
</body>
</html>
