<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tinkerbot Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f7f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .scene {
      position: relative;
      width: 100%;
      max-width: 680px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Robot as background wallpaper in bottom half */
    .robot-bg {
      position: fixed;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 520px;
      max-width: 90vw;
      z-index: 0;
      opacity: 0.9;
      filter: drop-shadow(0 -10px 60px rgba(240,120,80,0.2));
      pointer-events: none;
    }

    /* Cards sit in upper portion, above robot */
    .cards-area {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 48px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: auto;
      /* push cards to sit right above robot head */
      padding-bottom: 300px;
    }

    .studio-name {
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: #ccc;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .app-card {
      background: white;
      border-radius: 20px;
      padding: 22px;
      border: 1.5px solid #ede8e2;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .app-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
      transform: translateY(-3px);
    }
    .app-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .app-icon.mise { background: #ede8f5; }
    .app-icon.cents { background: #e8f0ec; }
    .app-info { flex: 1; min-width: 0; }
    .app-name {
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 3px;
    }
    .app-desc {
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }
    .arrow { font-size: 20px; color: #ccc; flex-shrink: 0; }

    @media (max-width: 480px) {
      .robot-bg { width: 100vw; bottom: -20px; }
      .cards-area { padding-bottom: 240px; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="cards-area">
      <div class="studio-name">Tinkerbot Studios</div>

      <a class="app-card" href="https://mise-en-stock.vercel.app/" target="_blank">
        <div class="app-icon mise">🥫</div>
        <div class="app-info">
          <div class="app-name">Mise en Stock</div>
          <div class="app-desc">Pantry and freezer inventory tracker. Scan barcodes, organize by category, and always know what's in stock.</div>
        </div>
        <div class="arrow">›</div>
      </a>

      <a class="app-card" href="https://commoncents-tinkerbot.vercel.app" target="_blank">
        <div class="app-icon cents">¢</div>
        <div class="app-info">
          <div class="app-name">Common Cents</div>
          <div class="app-desc">Shared expense tracker for two. Split bills, track balances, and settle up with ease.</div>
        </div>
        <div class="arrow">›</div>
      </a>
    </div>

    <img class="robot-bg" src="https://raw.githubusercontent.com/gyeung03/tinkerbot-studios/main/Tinkerbot.png" alt="Tinkerbot"/>
  </div>
</body>
</html>
